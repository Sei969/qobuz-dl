name: Publish to PyPI

# L'azione scatta SOLO quando pubblichi una nuova Release su GitHub
on:
  release:
    types: [published]

jobs:
  pypi-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    
    # Questi permessi servono a PyPI per il Trusted Publishing
    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout del codice
      uses: actions/checkout@v4

    - name: Setup Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Estrai la versione dal Tag di GitHub
      id: extract_version
      # Prende il tag (es. v1.5.1), toglie la "v" e lo salva
      run: |
        VERSION=${GITHUB_REF_NAME#v}
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "La versione che verrà iniettata è: $VERSION"

    - name: Inietta la versione nel setup.py
      # Cerca "version='...'" nel setup.py e lo sostituisce con la nuova versione
      run: |
        sed -i "s/version=['\"].*['\"]/version='${{ env.VERSION }}'/g" setup.py
        echo "Verifica del setup.py aggiornato:"
        grep "version=" setup.py

    - name: Installa i tool di compilazione
      run: python -m pip install --upgrade pip build

    - name: Compila il pacchetto (Wheel e Tarball)
      run: python -m build

    - name: Pubblica su PyPI
      uses: pypa/gh-action-pypi-publish@release/v1